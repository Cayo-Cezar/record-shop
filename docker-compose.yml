version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lea_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
